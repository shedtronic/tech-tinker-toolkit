baseURL = 'https://tech-tinker-toolkit.netlify.app/'
locale = 'en-us'
title = 'Tech Tinker Toolkit'
paginate = 6
enableRobotsTXT = true

defaultContentLanguage = 'en'

[params]
  subtitle = 'Helpful creative technology resources for teachers, makers, and learners'
  description = 'A practical toolkit of STEAM-ready lessons, worksheets, maker projects, and creative tech learning materials.'
  author = 'Tech Tinker Toolkit'
  github = 'https://github.com/tech-tinker-toolkit'
  newsletter = '#'
  etsy = '#'
  teacherspayteachers = 'https://www.teacherspayteachers.com/store/tech-tinker-toolkit'
  gumroad = '#'

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML']

[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
